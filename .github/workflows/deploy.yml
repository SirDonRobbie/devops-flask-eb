name: Flask CI/CD to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-north-1
  EB_APPLICATION_NAME: devops-flask-eb-app-v2
  EB_ENVIRONMENT_NAME: devops-flask-eb-env-v2
  DEPLOY_PACKAGE: flask-app-${{ github.sha }}.zip

jobs:
  ci:
    name: CI - Test, Lint and Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: PYTHONPATH=. pytest

      - name: Run linting
        run: flake8 application.py tests --ignore=W291,W292,W391

      - name: Run security scan
        run: bandit -r application.py --skip B104

  terraform:
    name: IaC - Provision AWS Environment
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan

      - name: Check if Elastic Beanstalk app already exists
        id: eb_check
        run: |
          if aws elasticbeanstalk describe-applications \
            --application-names ${{ env.EB_APPLICATION_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query "Applications[0].ApplicationName" \
            --output text | grep -q "${{ env.EB_APPLICATION_NAME }}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Terraform apply
        if: steps.eb_check.outputs.exists == 'false'
        working-directory: terraform
        run: terraform apply -auto-approve

  deploy:
    name: CD - Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create deployment package
        run: |
          zip -r ${{ env.DEPLOY_PACKAGE }} . \
            -x "*.git*" \
            -x "terraform/*" \
            -x "tests/*" \
            -x ".github/*" \
            -x "venv/*" \
            -x "__pycache__/*"

      - name: Upload package to S3
        run: |
          aws s3 mb s3://elasticbeanstalk-${{ env.AWS_REGION }}-${{ secrets.AWS_ACCOUNT_ID }} || true
          aws s3 cp ${{ env.DEPLOY_PACKAGE }} s3://elasticbeanstalk-${{ env.AWS_REGION }}-${{ secrets.AWS_ACCOUNT_ID }}/${{ env.DEPLOY_PACKAGE }}

      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ env.EB_APPLICATION_NAME }} \
            --version-label ${{ github.sha }} \
            --source-bundle S3Bucket="elasticbeanstalk-${{ env.AWS_REGION }}-${{ secrets.AWS_ACCOUNT_ID }}",S3Key="${{ env.DEPLOY_PACKAGE }}"

      - name: Deploy application version
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name ${{ env.EB_ENVIRONMENT_NAME }} \
            --version-label ${{ github.sha }}

      - name: Wait for deployment
        run: |
          for i in {1..30}; do
            STATUS=$(aws elasticbeanstalk describe-environments \
             --environment-names ${{ env.EB_ENVIRONMENT_NAME }} \
             --query "Environments[0].Status" \
             --output text)

            HEALTH=$(aws elasticbeanstalk describe-environments \
             --environment-names ${{ env.EB_ENVIRONMENT_NAME }} \
             --query "Environments[0].Health" \
             --output text)

            echo "Status=$STATUS Health=$HEALTH"

            if [ "$STATUS" = "Ready" ]; then
              exit 0
            fi

            sleep 30
          done

          echo "Environment did not become Ready in time"
          exit 1
          



